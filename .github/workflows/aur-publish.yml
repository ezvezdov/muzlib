name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.3.2)'
        required: true

  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Update PKGBUILD version and checksum
        run: |
          # Update pkgver
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" ./deploy/linux/PKGBUILD
          # Reset pkgrel
          sed -i "s/^pkgrel=.*/pkgrel=1/" ./deploy/linux/PKGBUILD
          # Fetch new sha256sum
          URL="https://files.pythonhosted.org/packages/source/m/muzlib/muzlib-${{ steps.version.outputs.VERSION }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA')/" ./deploy/linux/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: python-muzlib
          pkgbuild: ./deploy/linux/PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ezvezdov22@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.VERSION }}"
